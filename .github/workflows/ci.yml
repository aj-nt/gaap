name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/aj-nt/*
  GONOSUMCHECK: github.com/aj-nt/*
  GONOSUMDB: github.com/aj-nt/*

jobs:
  # ── Tests: race + vet + build ──
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gaap

      - name: Check out vassago-sdk (private dependency)
        uses: actions/checkout@v4
        with:
          repository: aj-nt/vassago-sdk
          path: vassago-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gaap/go.mod

      - name: Replace remote dependency with local
        run: cd gaap && go mod edit -replace github.com/aj-nt/vassago-sdk=../vassago-sdk && go mod tidy

      - name: Run tests with race detector
        run: cd gaap && go test -race -timeout 120s -count=1 ./...

      - name: Run go vet
        run: cd gaap && go vet ./...

      - name: Check build
        run: cd gaap && go build ./...

  # ── Lint ──
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gaap

      - name: Check out vassago-sdk (private dependency)
        uses: actions/checkout@v4
        with:
          repository: aj-nt/vassago-sdk
          path: vassago-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gaap/go.mod

      - name: Replace remote dependency with local
        run: cd gaap && go mod edit -replace github.com/aj-nt/vassago-sdk=../vassago-sdk && go mod tidy

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          install-mode: "goinstall"
          args: --timeout=5m
          working-directory: gaap

  # ── Security scan ──
  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: gaap

      - name: Check out vassago-sdk (private dependency)
        uses: actions/checkout@v4
        with:
          repository: aj-nt/vassago-sdk
          path: vassago-sdk

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: gaap/go.mod

      - name: Replace remote dependency with local
        run: cd gaap && go mod edit -replace github.com/aj-nt/vassago-sdk=../vassago-sdk && go mod tidy

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: gaap/go.mod
          work-dir: gaap
